name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check .

      - name: Build the warehouse and run the suite
        # No API key in CI: the SQL guard, executor, warehouse, harness (fake
        # client), and every golden reference query run offline. The live model
        # test skips automatically.
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image and run the suite inside the container
        run: |
          docker build -t ask-your-data .
          docker run --rm ask-your-data
