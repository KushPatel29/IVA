name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the warehouse and run the suite
        # No API key in CI: the SQL guard, executor, warehouse, and every golden
        # reference query run offline. The live model test skips automatically.
        run: pytest tests/ -v
